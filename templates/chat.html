{% extends "base_chat.html" %}

{% block content %}
<div style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background-color: #0d1117; background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'#2a333d\' fill-opacity=\'0.2\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');">
  
  <div class="chat-history" style="flex: 1; overflow-y: auto; padding: 1rem 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; -webkit-overflow-scrolling: touch;">
    {% if not messages %}
      <div style="align-self: center; background: rgba(0,0,0,0.5); color: #ccc; padding: 0.5rem 1rem; border-radius: 12px; font-size: 0.85rem; margin-top: 1rem;">
        Ask the Coach a question about your training or recovery!
      </div>
    {% endif %}
    
    {% for msg in messages %}
      {% if msg.role == 'user' %}
        <div style="align-self: flex-end; background: #005c4b; color: #e9edef; padding: 0.6rem 0.8rem; border-radius: 12px 0 12px 12px; max-width: 85%; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.2); line-height: 1.4;">
          {{ msg.content }}
        </div>
      {% else %}
        <div class="ai-message" style="align-self: flex-start; background: #202c33; color: #e9edef; padding: 0.6rem 0.8rem; border-radius: 0 12px 12px 12px; max-width: 85%; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.2); line-height: 1.5;">{{ msg.content }}</div>
      {% endif %}
    {% endfor %}
  </div>

  <div style="flex: none; background: #202c33; padding: 0.5rem 0.5rem; padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); border-top: 1px solid #2a3942;">
    <form id="chat-form" method="post" action="/chat" style="display: flex; gap: 0.5rem; margin: 0; align-items: center;" onsubmit="showLoading()">
      <input type="text" id="chat-input" name="message" placeholder="Message..." required autocomplete="off"
             style="flex: 1; padding: 0.75rem 1rem; border-radius: 24px; border: none; background: #2a3942; color: #e9edef; font-size: 16px; margin: 0; outline: none; box-shadow: none;">
      <button type="submit" id="chat-submit" class="btn" style="border-radius: 50%; width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; background: #00a884; flex-shrink: 0; box-shadow: none; border: none; cursor: pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: -2px; color: #111b21;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  // Render markdown for all AI messages
  document.querySelectorAll('.ai-message').forEach(el => {
    const rawText = el.textContent.trim();
    el.innerHTML = marked.parse(rawText);
    
    // Add WhatsApp styling to generated elements
    el.querySelectorAll('p').forEach(p => p.style.margin = '0 0 0.5rem 0');
    el.querySelectorAll('p:last-child').forEach(p => p.style.margin = '0');
    el.querySelectorAll('ul, ol').forEach(list => {
      list.style.margin = '0 0 0.5rem 0';
      list.style.paddingLeft = '1.2rem';
    });
  });

  // Auto-scroll to bottom of chat
  const history = document.querySelector('.chat-history');
  if (history) {
    history.scrollTop = history.scrollHeight;
  }

  // Safari iOS keyboard gap fix: when input loses focus, force a tiny scroll or layout calculation
  const inputFieldEl = document.getElementById('chat-input');
  if (inputFieldEl) {
    inputFieldEl.addEventListener('blur', () => {
      setTimeout(() => {
        window.scrollTo(0, 0);
      }, 100);
    });
  }

  function showLoading() {
    const submitBtn = document.getElementById('chat-submit');
    const inputField = document.getElementById('chat-input');
    
    // Disable button to prevent double-submit
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.7';
    
    // Create a temporary user message bubble
    const userMsg = document.createElement('div');
    userMsg.style.alignSelf = 'flex-end';
    userMsg.style.background = '#005c4b';
    userMsg.style.color = '#e9edef';
    userMsg.style.padding = '0.6rem 0.8rem';
    userMsg.style.borderRadius = '12px 0 12px 12px';
    userMsg.style.maxWidth = '85%';
    userMsg.style.fontSize = '0.95rem';
    userMsg.style.boxShadow = '0 1px 2px rgba(0,0,0,0.2)';
    userMsg.style.lineHeight = '1.4';
    userMsg.innerText = inputField.value;
    history.appendChild(userMsg);
    
    // Create a temporary loading bubble for the coach
    const loadMsg = document.createElement('div');
    loadMsg.style.alignSelf = 'flex-start';
    loadMsg.style.background = '#202c33';
    loadMsg.style.color = '#e9edef';
    loadMsg.style.padding = '0.6rem 0.8rem';
    loadMsg.style.borderRadius = '0 12px 12px 12px';
    loadMsg.style.maxWidth = '85%';
    loadMsg.style.fontSize = '0.95rem';
    loadMsg.style.boxShadow = '0 1px 2px rgba(0,0,0,0.2)';
    loadMsg.style.fontStyle = 'italic';
    loadMsg.style.opacity = '0.7';
    loadMsg.innerText = 'Typing...';
    history.appendChild(loadMsg);
    
    history.scrollTop = history.scrollHeight;

    // Clear input field slightly after submit so the browser still sends the data
    setTimeout(() => {
      inputField.value = '';
      inputField.blur();
    }, 10);
  }
</script>
{% endblock %}
