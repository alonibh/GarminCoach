<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>{% block title %}Coach Chat{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/style.css?v={{ asset_version() }}">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body.chat-app {
      margin: 0;
      padding: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Lock body scrolling to prevent Safari gap & reading mode */
      background: #0f1419;
    }
    .chat-header {
      flex: none;
      display: flex; align-items: center; gap: 1.5rem;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }
    .brand { font-weight: 700; font-size: 1.2rem; text-decoration: none; color: var(--fg); }
    .chat-header nav a { color: var(--muted); text-decoration: none; margin-right: 1rem; }
    .chat-header nav a:hover { color: var(--fg); }
    
    @media (max-width: 768px) {
      .chat-header { 
        flex-direction: column; 
        align-items: flex-start; 
        gap: 0.75rem; 
        padding: 1rem;
      }
      .chat-header nav { width: 100%; display: flex; flex-wrap: wrap; gap: 0.5rem; }
      .chat-header nav a { margin-right: 0.5rem; }
    }
  </style>
</head>
<body class="chat-app">
  <header class="chat-header">
    <a href="/" class="brand">🏃 GarminCoach</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/calendar">Calendar</a>
      <a href="/app-logout" class="muted" style="font-size:.8rem">Sign out</a>
    </nav>
  </header>
  
  {% block content %}{% endblock %}

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js');
      });
    }
  </script>
</body>
</html>
